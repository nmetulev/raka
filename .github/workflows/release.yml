name: Release

on:
  push:
    branches: [master, main]
    paths:
      - 'Directory.Build.props'
      - 'src/**'
      - 'msix/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}

    steps:
      - uses: actions/checkout@v4

      - name: Read version from Directory.Build.props
        id: read
        run: |
          version=$(grep -oP '<Version>\K[^<]+' Directory.Build.props)
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Version: $version"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.read.outputs.version }}" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "Release v${{ steps.read.outputs.version }} already exists — skipping."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "No release for v${{ steps.read.outputs.version }} — will create."
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Setup WinApp CLI
        uses: microsoft/setup-WinAppCli@v0.1

      - name: Build all
        run: .\build.ps1

      - name: Zip MSIX distribution
        run: |
          $version = "${{ needs.check-version.outputs.version }}"
          Compress-Archive -Path "artifacts/msix/*" -DestinationPath "artifacts/raka-msix-v$version.zip"

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-packages
          path: artifacts/cli/*.zip

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nuget/*.nupkg

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: msix-packages
          path: artifacts/raka-msix-v${{ needs.check-version.outputs.version }}.zip

  release:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ needs.check-version.outputs.version }}"
          gh release create "v${version}" \
            --repo ${{ github.repository }} \
            --title "Raka v${version}" \
            --generate-notes \
            release-assets/cli-packages/*.zip \
            release-assets/nuget-packages/*.nupkg \
            release-assets/msix-packages/raka-msix-v${version}.zip
